# Parameter help (shown in [?] popups)
param.model_name.help = Model name\n\n\
    The base filename for the saved model. The file will be written as <name>.json \
    in the chosen output directory.\n\n\
    This file is self-contained: it embeds the feature names and class names, \
    so no other metadata file is needed at inference time using Run XGBoost classifier.\n\n\
    Unfortunately at this time, the JSON format used by XGBoost is not compatible with \
    the way QuPath stores information for its other classifiers.

param.model_dir.help = Output directory\n\n\
    The folder where the model JSON file will be saved. \
    Defaults to the project\u2019s classifiers/object_classifiers/ folder if left blank.\n\n\
    Tip 1: keeping models in the project folder makes them easy to find \
    and share alongside the project.\n\n\
    Tip 2: the training can be done in one project, and running the classifier in \
    a different project.

param.num_rounds.help = Rounds (number of boosting rounds)\n\n\
    Each round adds one new decision tree to the ensemble. More rounds \
    generally improve accuracy, but too many can cause overfitting \u2014 \
    where the model memorises training data rather than learning general patterns.\n\n\
    Typical range: 50\u2013500. Start with 150 and increase if the \
    training log shows the model is still improving. \
    Decrease if you notice it classifying training images well but new images poorly.

param.max_depth.help = Max depth (maximum tree depth)\n\n\
    Controls how complex each individual decision tree can be. \
    A deeper tree can capture more intricate patterns, but also risks \
    overfitting, especially with small training sets.\n\n\
    Typical range: 3\u20138. Use lower values (3\u20134) when you have \
    few training objects or many features. Use higher values (6\u20138) \
    when patterns are complex and you have ample training data.

param.eta.help = Learning rate \u03b7 (eta)\n\n\
    Scales the contribution of each new tree. A lower value makes \
    learning more conservative: each round makes a smaller correction, \
    so more rounds are needed to reach the same accuracy \u2014 but the \
    result is often more robust.\n\n\
    Typical range: 0.05\u20130.3. If you lower \u03b7, increase Rounds proportionally. \
    For example, halving \u03b7 from 0.2 to 0.1 usually means doubling the rounds.

param.subsample.help = Subsample\n\n\
    The fraction of training objects randomly sampled to build each tree. \
    Using less than 1.0 introduces randomness that helps prevent overfitting \
    and can make the model more robust to outliers.\n\n\
    Typical range: 0.6\u20131.0. Values around 0.8 work well in most cases. \
    Lower values add more randomness but may require more rounds to converge.

param.top_n.help = Top-N features\n\n\
    After the first training pass, XGBoost scores every feature by how \
    much it improves predictions (gain importance). Only the top N features \
    are kept for the final model.\n\n\
    This reduces noise from irrelevant measurements and often improves \
    generalisation to new images. Set to 0 to keep all features.\n\n\
    Tip: run once with 0 to see the full importance ranking in the log, \
    then re-train with a smaller value (e.g. 5\u201315) to build a leaner model.

